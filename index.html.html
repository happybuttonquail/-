<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>🐠 바다 물고기 잡기</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jua', sans-serif; background: #0a0e1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    @media (orientation: portrait) {
      body::before { content: '📱 화면을 가로로 돌려주세요!'; position: fixed; inset: 0; z-index: 9999; background: #0a0e1a; color: #90caf9; font-family: 'Jua', sans-serif; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    }
    .screen { display: none; width: 100%; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* 시작화면 */
    #startScreen { align-items: center; justify-content: center; background: linear-gradient(180deg,#001220,#003355 50%,#001a33); }
    .start-box { text-align: center; padding: 40px 30px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); max-width: 340px; width: 90%; }
    .start-box h1 { font-size: 2rem; color: #90caf9; margin-bottom: 6px; }
    .start-box p  { color: #78909c; font-size: 0.95rem; margin-bottom: 30px; }
    .start-btns   { display: flex; gap: 14px; justify-content: center; }
    .start-btn { padding: 14px 28px; border: none; border-radius: 14px; font-family: 'Jua', sans-serif; font-size: 1.1rem; cursor: pointer; transition: transform 0.15s, filter 0.15s; }
    .start-btn:hover { transform: scale(1.06); filter: brightness(1.12); }
    .btn-admin  { background: linear-gradient(135deg,#b71c1c,#e53935); color: white; }
    .btn-player { background: linear-gradient(135deg,#1565c0,#42a5f5); color: white; }

    /* 로그인/이름 공통 */
    #loginScreen, #nameScreen { align-items: center; justify-content: center; background: linear-gradient(180deg,#001220,#003355 50%,#001a33); }
    .login-box { padding: 36px 28px; text-align: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; max-width: 320px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .login-box h2 { color: #90caf9; margin-bottom: 20px; font-size: 1.4rem; }
    .login-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid rgba(255,255,255,0.15); border-radius: 12px; background: rgba(255,255,255,0.07); color: #e0e0e0; font-family: 'Jua', sans-serif; font-size: 1rem; outline: none; text-align: center; }
    .login-input:focus { border-color: #42a5f5; }
    .login-submit { width: 100%; padding: 13px; border: none; border-radius: 12px; background: linear-gradient(135deg,#1565c0,#42a5f5); color: white; font-family: 'Jua', sans-serif; font-size: 1.05rem; cursor: pointer; margin-top: 4px; }
    .login-back { margin-top: 12px; background: none; border: none; color: #78909c; font-family: 'Jua', sans-serif; font-size: 0.9rem; cursor: pointer; }
    .login-err { color: #ef9a9a; font-size: 0.88rem; margin-top: 6px; min-height: 1.2em; }

    /* 나가기/로그아웃 버튼 */
    .back-btn { position: fixed; top: 12px; left: 12px; z-index: 500; padding: 8px 14px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #e0e0e0; font-family: 'Jua', sans-serif; font-size: 0.9rem; cursor: pointer; }
    .back-btn:hover { background: rgba(255,255,255,0.15); }
    .logout-btn { display: none; position: fixed; top: 12px; right: 12px; z-index: 500; padding: 8px 14px; background: rgba(183,28,28,0.3); border: 1px solid rgba(239,154,154,0.3); border-radius: 10px; color: #ef9a9a; font-family: 'Jua', sans-serif; font-size: 0.9rem; cursor: pointer; }
    .logout-btn:hover { background: rgba(183,28,28,0.5); }
    .logout-btn.visible { display: block; }

    /* Admin 화면 */
    #adminScreen { background: linear-gradient(180deg,#0a0e1a,#0d1b2a); padding: 14px; padding-top: 52px; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 12px 16px; margin-bottom: 12px; }
    .admin-header h2 { color: #ef9a9a; font-size: 1.2rem; }
    .admin-header-btns { display: flex; gap: 8px; }
    .icon-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 8px 12px; cursor: pointer; font-size: 1.2rem; transition: background 0.15s; }
    .icon-btn:hover { background: rgba(255,255,255,0.15); }
    .admin-panels { display: flex; gap: 12px; flex: 1; }
    .admin-panel { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 14px; overflow-y: auto; }
    .admin-panel h3 { color: #90caf9; margin-bottom: 10px; font-size: 1rem; }
    .make-room-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; background: linear-gradient(135deg,#2e7d32,#66bb6a); color: white; font-family: 'Jua', sans-serif; font-size: 1rem; cursor: pointer; margin-bottom: 10px; }
    .room-item { background: rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; }
    .room-item span { color: #e0e0e0; font-size: 0.9rem; }
    .room-open-badge { background: #2e7d32; color: white; font-size: 0.75rem; padding: 3px 8px; border-radius: 20px; }
    .player-item { background: rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; }
    .player-item span { color: #e0e0e0; font-size: 0.9rem; }
    .player-actions { display: flex; gap: 6px; }
    .player-action-btn { background: rgba(255,255,255,0.1); border: none; border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 1rem; }
    .player-action-btn:hover { background: rgba(255,255,255,0.2); }

    /* 게임 화면 */
    #gameScreen { background: linear-gradient(180deg,#0a0e1a,#0d1b2a); padding: 10px; padding-top: 52px; }
    .game-header { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 10px 14px; margin-bottom: 10px; }
    .game-header-left { display: flex; flex-direction: column; }
    .player-name-label { color: #90caf9; font-size: 0.85rem; }
    .coin-display { color: #ffd54f; font-size: 1.1rem; }
    .view-toggle { display: flex; gap: 8px; }
    .view-btn { padding: 8px 14px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; background: rgba(255,255,255,0.06); color: #e0e0e0; font-family: 'Jua', sans-serif; font-size: 0.88rem; cursor: pointer; }
    .view-btn.active { background: #1565c0; border-color: #42a5f5; color: white; }
    .shop-btn { padding: 8px 14px; border: none; border-radius: 10px; background: linear-gradient(135deg,#f57f17,#ffd54f); color: #0a0e1a; font-family: 'Jua', sans-serif; font-size: 0.88rem; cursor: pointer; }

    /* 바다/수족관 */
    #oceanView { flex: 1; position: relative; overflow: hidden; border-radius: 18px; border: 2px solid rgba(255,255,255,0.08); background: linear-gradient(180deg,#002244,#004488 30%,#006699 70%,#001a33); min-height: 340px; margin-bottom: 10px; }
    #oceanView::before { content:''; position:absolute; inset:0; pointer-events:none; background: repeating-linear-gradient(85deg,transparent,transparent 60px,rgba(255,255,255,0.03) 60px,rgba(255,255,255,0.03) 62px); }
    .ocean-floor { position:absolute; bottom:0; left:0; right:0; height:28px; background:linear-gradient(180deg,#8d6e63,#5d4037); border-radius:0 0 16px 16px; }
    .ocean-bubble { position:absolute; border-radius:50%; background:rgba(255,255,255,0.18); animation:rise linear infinite; }
    @keyframes rise { 0%{bottom:-16px;opacity:0.6} 100%{bottom:110%;opacity:0} }
    .ocean-coral { position:absolute; bottom:28px; width:12px; background:#e53935; border-radius:50% 50% 0 0; transform-origin:bottom center; animation:sway 3s ease-in-out infinite; }
    @keyframes sway { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} }
    .ocean-fish { position:absolute; cursor:pointer; user-select:none; }
    .ocean-fish:hover { filter:brightness(1.4) drop-shadow(0 0 6px rgba(255,255,200,0.8)); }
    .grade-badge { position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:0.65rem; padding:2px 6px; border-radius:8px; white-space:nowrap; font-family:'Jua',sans-serif; pointer-events:none; }
    .badge-common{background:#616161;color:white} .badge-uncommon{background:#2e7d32;color:white}
    .badge-rare{background:#1565c0;color:white} .badge-secret{background:#6a1b9a;color:#ffd54f}
    .coin-pop { position:absolute; color:#ffd54f; font-family:'Jua',sans-serif; font-size:0.85rem; pointer-events:none; z-index:10; animation:popUp 1.2s ease-out forwards; }
    @keyframes popUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-40px)} }
    #tankView { display:none; flex:1; position:relative; overflow:hidden; border-radius:18px; border:2px solid rgba(255,255,255,0.08); background:linear-gradient(180deg,#0288d1,#01579b 65%,#1a237e); min-height:340px; margin-bottom:10px; }
    .tank-sand { position:absolute; bottom:0; left:0; right:0; height:22px; background:linear-gradient(180deg,#f9a825,#e65100); border-radius:0 0 16px 16px; }
    .tank-seaweed { position:absolute; bottom:22px; width:10px; background:#2e7d32; border-radius:50% 50% 0 0; transform-origin:bottom center; animation:sway 3s ease-in-out infinite; }
    .tank-bubble { position:absolute; border-radius:50%; background:rgba(255,255,255,0.25); animation:rise linear infinite; }
    .tank-empty { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:rgba(255,255,255,0.3); font-size:0.95rem; text-align:center; }

    /* 물고기 CSS */
    .fish { position:absolute; }
    .fish-anchovy .body { width:32px; height:9px; background:linear-gradient(90deg,#e0e0e0,#bdbdbd); border-radius:50% 60% 60% 50%; position:relative; }
    .fish-anchovy .tail { position:absolute; right:-9px; top:-4px; border-top:8px solid transparent; border-bottom:8px solid transparent; border-left:11px solid #9e9e9e; }
    .fish-anchovy .eye { position:absolute; left:4px; top:1px; width:4px; height:4px; background:#333; border-radius:50%; }
    .fish-mackerel .body { width:54px; height:20px; background:linear-gradient(90deg,#64b5f6,#1976d2); border-radius:50% 55% 55% 50%; position:relative; overflow:hidden; }
    .fish-mackerel .stripe { position:absolute; top:5px; left:0; right:0; height:3px; background:rgba(13,71,161,0.45); box-shadow:0 6px 0 rgba(13,71,161,0.35); }
    .fish-mackerel .tail { position:absolute; right:-14px; top:-6px; border-top:16px solid transparent; border-bottom:16px solid transparent; border-left:16px solid #1565c0; }
    .fish-mackerel .eye { position:absolute; left:7px; top:4px; width:6px; height:6px; background:#111; border-radius:50%; border:1.5px solid white; }
    .fish-goldfish .body { width:44px; height:34px; background:radial-gradient(circle at 38% 38%,#ffcc80,#e64a19); border-radius:50%; position:relative; }
    .fish-goldfish .tail { position:absolute; right:-20px; top:-9px; border-top:26px solid transparent; border-bottom:26px solid transparent; border-left:24px solid #ff7043; }
    .fish-goldfish .fin { position:absolute; top:-11px; left:16px; width:14px; height:13px; background:#ff8a65; border-radius:50% 50% 0 0; }
    .fish-goldfish .eye { position:absolute; left:8px; top:10px; width:8px; height:8px; background:#111; border-radius:50%; border:2px solid white; }
    .fish-whaleshark .body { width:92px; height:42px; background:#546e7a; border-radius:50% 40% 40% 50%; position:relative; overflow:hidden; }
    .fish-whaleshark .body::before { content:''; position:absolute; inset:0; background:radial-gradient(circle 5px at 18px 14px,#90a4ae 50%,transparent 50%),radial-gradient(circle 4px at 38px 8px,#90a4ae 50%,transparent 50%),radial-gradient(circle 5px at 58px 18px,#90a4ae 50%,transparent 50%),radial-gradient(circle 4px at 28px 30px,#90a4ae 50%,transparent 50%),radial-gradient(circle 4px at 50px 34px,#90a4ae 50%,transparent 50%); }
    .fish-whaleshark .tail { position:absolute; right:-24px; top:-11px; border-top:32px solid transparent; border-bottom:32px solid transparent; border-left:27px solid #455a64; }
    .fish-whaleshark .fin { position:absolute; top:-17px; left:26px; width:22px; height:19px; background:#455a64; border-radius:50% 50% 0 0; }
    .fish-whaleshark .eye { position:absolute; left:11px; top:13px; width:10px; height:10px; background:#111; border-radius:50%; border:2px solid white; }

    /* 퀴즈 팝업 */
    .quiz-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:50; align-items:center; justify-content:center; }
    .quiz-overlay.open { display:flex; }
    .quiz-box { background:#0d1b2a; border:1px solid rgba(255,255,255,0.12); border-radius:22px; padding:28px 24px; width:90%; max-width:360px; text-align:center; }
    .quiz-grade { font-size:0.85rem; padding:4px 12px; border-radius:20px; display:inline-block; margin-bottom:10px; }
    .quiz-fish-preview { font-size:2.5rem; margin-bottom:6px; }
    .quiz-name { color:#90caf9; font-size:1.1rem; margin-bottom:4px; }
    .quiz-cost { color:#ffd54f; font-size:0.9rem; margin-bottom:16px; }
    .quiz-problem { font-size:1.6rem; color:#e0e0e0; margin-bottom:16px; background:rgba(255,255,255,0.05); border-radius:12px; padding:12px; }
    .quiz-input { width:100%; padding:12px; border:2px solid rgba(255,255,255,0.15); border-radius:12px; background:rgba(255,255,255,0.07); color:#e0e0e0; font-family:'Jua',sans-serif; font-size:1.2rem; outline:none; text-align:center; margin-bottom:10px; }
    .quiz-input:focus { border-color:#42a5f5; }
    .quiz-btns { display:flex; gap:10px; }
    .quiz-submit { flex:1; padding:12px; border:none; border-radius:12px; background:linear-gradient(135deg,#1565c0,#42a5f5); color:white; font-family:'Jua',sans-serif; font-size:1rem; cursor:pointer; }
    .quiz-cancel { padding:12px 18px; border:1px solid rgba(255,255,255,0.15); border-radius:12px; background:rgba(255,255,255,0.07); color:#e0e0e0; font-family:'Jua',sans-serif; font-size:1rem; cursor:pointer; }
    .quiz-feedback { margin-top:10px; font-size:0.95rem; min-height:1.3em; }
    .quiz-feedback.ok{color:#a5d6a7} .quiz-feedback.err{color:#ef9a9a}

    /* 모달 공통 */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#0d1b2a; border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:24px; width:90%; max-width:380px; max-height:80vh; overflow-y:auto; }
    .modal-box h3 { color:#90caf9; margin-bottom:14px; }
    .modal-close { float:right; background:none; border:none; color:#78909c; font-size:1.3rem; cursor:pointer; }
    .search-input { width:100%; padding:10px; border:2px solid rgba(255,255,255,0.15); border-radius:10px; background:rgba(255,255,255,0.07); color:#e0e0e0; font-family:'Jua',sans-serif; font-size:0.95rem; outline:none; margin-bottom:12px; }
    .search-result-item { background:rgba(255,255,255,0.06); border-radius:10px; padding:10px 12px; margin-bottom:8px; border:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:space-between; }
    .search-result-item span { color:#e0e0e0; font-size:0.9rem; }
    .msg-textarea { width:100%; height:90px; padding:10px; border:2px solid rgba(255,255,255,0.15); border-radius:10px; background:rgba(255,255,255,0.07); color:#e0e0e0; font-family:'Jua',sans-serif; font-size:0.95rem; outline:none; resize:none; margin-bottom:10px; }
    .msg-send-btn { width:100%; padding:11px; border:none; border-radius:10px; background:linear-gradient(135deg,#1565c0,#42a5f5); color:white; font-family:'Jua',sans-serif; font-size:1rem; cursor:pointer; }
    .gift-row { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .gift-input { flex:1; padding:10px; border:2px solid rgba(255,255,255,0.15); border-radius:10px; background:rgba(255,255,255,0.07); color:#e0e0e0; font-family:'Jua',sans-serif; font-size:0.95rem; outline:none; text-align:center; }
    .gift-label { color:#ffd54f; font-size:0.9rem; white-space:nowrap; }
    .gift-btn { width:100%; padding:11px; border:none; border-radius:10px; background:linear-gradient(135deg,#f57f17,#ffd54f); color:#0a0e1a; font-family:'Jua',sans-serif; font-size:1rem; cursor:pointer; margin-bottom:8px; }
    .gift-fish-list { margin-top:10px; }
    .gift-fish-btn { width:100%; padding:10px; border:none; border-radius:10px; background:rgba(255,255,255,0.08); color:#e0e0e0; font-family:'Jua',sans-serif; font-size:0.9rem; cursor:pointer; margin-bottom:6px; border:1px solid rgba(255,255,255,0.1); text-align:left; }
    .gift-fish-btn:hover { background:rgba(255,255,255,0.15); }

    /* 상점 */
    .shop-item-card { background:rgba(255,255,255,0.06); border-radius:12px; padding:12px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.08); }
    .shop-item-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .shop-item-name { color:#e0e0e0; font-size:0.95rem; }
    .shop-item-level { color:#ffd54f; font-size:0.82rem; }
    .shop-level-btn { padding:8px 14px; border:none; border-radius:8px; background:linear-gradient(135deg,#6a1b9a,#ab47bc); color:white; font-family:'Jua',sans-serif; font-size:0.85rem; cursor:pointer; }
    .shop-level-btn:disabled { background:rgba(255,255,255,0.1); color:#546e7a; cursor:not-allowed; }
    .shop-no-fish { color:#546e7a; font-size:0.9rem; text-align:center; padding:20px 0; }

    /* 메세지 수신함 */
    .msg-inbox { position:fixed; bottom:20px; right:16px; z-index:200; display:flex; flex-direction:column; gap:8px; max-width:280px; }
    .msg-card { background:#0d1b2a; border:1px solid rgba(144,202,249,0.3); border-radius:16px; padding:14px; box-shadow:0 4px 20px rgba(0,0,0,0.5); animation:slideIn 0.3s ease; }
    @keyframes slideIn { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }
    .msg-from { color:#ef9a9a; font-size:0.8rem; margin-bottom:4px; }
    .msg-body { color:#e0e0e0; font-size:0.9rem; margin-bottom:10px; }
    .msg-card-btns { display:flex; gap:8px; }
    .msg-close-btn { flex:1; padding:7px; border:1px solid rgba(255,255,255,0.15); border-radius:8px; background:rgba(255,255,255,0.07); color:#e0e0e0; font-family:'Jua',sans-serif; font-size:0.85rem; cursor:pointer; }
    .msg-reply-btn { flex:1; padding:7px; border:none; border-radius:8px; background:#1565c0; color:white; font-family:'Jua',sans-serif; font-size:0.85rem; cursor:pointer; }
    .msg-reply-area { display:none; margin-top:8px; }
    .msg-reply-input { width:100%; padding:8px; border:2px solid rgba(255,255,255,0.15); border-radius:8px; background:rgba(255,255,255,0.07); color:#e0e0e0; font-family:'Jua',sans-serif; font-size:0.85rem; outline:none; margin-bottom:6px; resize:none; height:60px; }
    .msg-reply-send { width:100%; padding:8px; border:none; border-radius:8px; background:#42a5f5; color:white; font-family:'Jua',sans-serif; font-size:0.85rem; cursor:pointer; }
    .gift-notif { background:#0d1b2a; border:1px solid rgba(255,213,79,0.4); border-radius:16px; padding:14px; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
    .gift-notif-title { color:#ffd54f; font-size:0.85rem; margin-bottom:4px; }
    .gift-notif-body  { color:#e0e0e0; font-size:0.9rem; margin-bottom:8px; }
    .gift-notif-close { width:100%; padding:7px; border:none; border-radius:8px; background:rgba(255,213,79,0.15); color:#ffd54f; font-family:'Jua',sans-serif; font-size:0.85rem; cursor:pointer; }

    /* 댓글 */
    .comment-list { max-height:260px; overflow-y:auto; margin-bottom:14px; display:flex; flex-direction:column; gap:8px; }
    .comment-item { background:rgba(255,255,255,0.06); border-radius:10px; padding:10px 12px; border:1px solid rgba(255,255,255,0.08); position:relative; }
    .comment-author { color:#90caf9; font-size:0.8rem; margin-bottom:3px; }
    .comment-text   { color:#e0e0e0; font-size:0.9rem; word-break:break-all; }
    .comment-delete { position:absolute; top:8px; right:8px; background:none; border:none; color:#ef9a9a; font-size:0.85rem; cursor:pointer; display:none; }
    .comment-delete.visible { display:block; }
    .comment-input-row { display:flex; gap:8px; }

<script>
// ════════════════════════════════
//  CONFIG
// ════════════════════════════════
const ADMIN_ID  = '오레망';
const ADMIN_PW  = 'Abcd01097852174!';
const NETLIFY_URL = 'https://inspiring-cobbler-5d8d3d.netlify.app/';

const GRADES = {
  common:   { name:'멸치',    label:'일반',   emoji:'🐟', cssClass:'anchovy',   w:42,  h:17, cost:10,  spawnWeight:70, autoSec:5, autoCoin:1 },
  uncommon: { name:'고등어',  label:'희귀',   emoji:'🐡', cssClass:'mackerel',  w:70,  h:26, cost:20,  spawnWeight:25, autoSec:2, autoCoin:1 },
  rare:     { name:'금붕어',  label:'레어',   emoji:'🐠', cssClass:'goldfish',  w:66,  h:45, cost:30,  spawnWeight:5,  autoSec:1, autoCoin:1 },
  secret:   { name:'고래상어',label:'시크릿', emoji:'🦈', cssClass:'whaleshark',w:116, h:54, cost:100, spawnWeight:0,  autoSec:5, autoCoin:15},
};
const GRADE_COLORS = { common:'#616161', uncommon:'#2e7d32', rare:'#1565c0', secret:'#6a1b9a' };

// JSONBin
const BIN_KEY      = '$2a$10$lkUqWikTGI9NKt2RW4rjGO40ldu0kZxx3wXZIKPU2WRPKp4fEOcYK';
const COMMENT_URL  = 'https://api.jsonbin.io/v3/b/6a243243da38895dfe9129a4';
const GAME_URL     = 'https://api.jsonbin.io/v3/b/6a2434e9f5f4af5e29c2b44a';
const HEADERS_R    = { 'X-Master-Key': BIN_KEY };
const HEADERS_W    = { 'Content-Type':'application/json', 'X-Master-Key': BIN_KEY };

// ════════════════════════════════
//  STATE
// ════════════════════════════════
let players  = {}; // { name: { coins, fish:{grade:count}, fishLevels:{grade:level}, messages:[], pendingSpawn:[], pendingGifts:[] } }
let rooms    = [];
let comments = [];
let myName   = null;
let isAdmin  = false;
let currentView = 'ocean';
let quizGrade = null, quizAnswer = 0, quizFishEl = null;
let autoTimers = [], lobbyInterval = null, pollInterval = null;
let fromComment = false;

// ════════════════════════════════
//  JSONBin 함수
// ════════════════════════════════
async function loadComments() {
  try {
    const d = await (await fetch(COMMENT_URL+'/latest', {headers:HEADERS_R})).json();
    comments = d.record.comments || [];
  } catch(e){ comments=[]; }
}
async function saveComments() {
  try { await fetch(COMMENT_URL, {method:'PUT', headers:HEADERS_W, body:JSON.stringify({comments})}); } catch(e){}
}
async function loadGameData() {
  try {
    const d = await (await fetch(GAME_URL+'/latest', {headers:HEADERS_R})).json();
    rooms = d.record.rooms || [];
    const rp = d.record.players || [];
    rp.forEach(p => {
      if (!players[p.name]) players[p.name] = {coins:p.coins, fish:p.fish||{}, fishLevels:p.fishLevels||{}, messages:[], pendingSpawn:[], pendingGifts:[]};
      else { players[p.name].coins=p.coins; players[p.name].fish=p.fish||{}; players[p.name].fishLevels=p.fishLevels||{}; }
      // 메세지/선물/소환 대기열 병합
      if (p.messages && p.messages.length) players[p.name].messages.push(...p.messages);
      if (p.pendingSpawn && p.pendingSpawn.length) players[p.name].pendingSpawn.push(...p.pendingSpawn);
      if (p.pendingGifts && p.pendingGifts.length) players[p.name].pendingGifts.push(...p.pendingGifts);
    });
  } catch(e){}
}
async function saveGameData() {
  try {
    const rp = Object.entries(players).map(([name,p])=>({
      name, coins:p.coins, fish:p.fish, fishLevels:p.fishLevels||{},
      messages:p.messages||[], pendingSpawn:p.pendingSpawn||[], pendingGifts:p.pendingGifts||[]
    }));
    await fetch(GAME_URL, {method:'PUT', headers:HEADERS_W, body:JSON.stringify({rooms, players:rp})});
  } catch(e){}
}
async function clearPlayerQueues(name) {
  if (!players[name]) return;
  players[name].messages = [];
  players[name].pendingSpawn = [];
  players[name].pendingGifts = [];
  await saveGameData();
}

// ════════════════════════════════
//  화면 전환
// ════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // 로그인된 상태면 로그아웃 버튼 표시
  const logoutBtn = document.getElementById('logoutBtn');
  if ((myName || isAdmin) && id !== 'startScreen') {
    logoutBtn.classList.add('visible');
  } else {
    logoutBtn.classList.remove('visible');
  }
}
function doLogout() {
  if (lobbyInterval) { clearInterval(lobbyInterval); lobbyInterval=null; }
  if (pollInterval)  { clearInterval(pollInterval);  pollInterval=null;  }
  myName=null; isAdmin=false;
  document.getElementById('logoutBtn').classList.remove('visible');
  document.getElementById('adminId').value='';
  document.getElementById('adminPw').value='';
  showScreen('startScreen');
  showToast('로그아웃 됐어요!');
}
function goMain() {
  if (lobbyInterval) { clearInterval(lobbyInterval); lobbyInterval=null; }
  if (pollInterval)  { clearInterval(pollInterval);  pollInterval=null;  }
  document.getElementById('logoutBtn').classList.remove('visible');
  showScreen('startScreen');
}

// ════════════════════════════════
//  Admin 로그인
// ════════════════════════════════
async function tryAdminLogin() {
  const id = document.getElementById('adminId').value.trim();
  const pw = document.getElementById('adminPw').value;
  if (id===ADMIN_ID && pw===ADMIN_PW) {
    document.getElementById('loginErr').textContent='';
    isAdmin=true;
    if (fromComment) {
      fromComment=false;
      document.getElementById('commentLoginView').style.display='none';
      document.getElementById('commentMainView').style.display='block';
      loadComments().then(()=>renderComments());
      openModal('commentModal'); showScreen('startScreen');
    } else {
      showScreen('adminScreen');
      // Admin 실시간 갱신 (2초마다 서버에서 직접)
      await refreshAdminData();
      setInterval(refreshAdminData, 2000);
    }
  } else { document.getElementById('loginErr').textContent='아이디 또는 비밀번호가 틀렸어요!'; }
}

function dbg(msg) {
  const box = document.getElementById('debugBox');
  if (!box) return;
  const line = document.createElement('div');
  line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

async function refreshAdminData() {
  try {
    const res = await fetch(GAME_URL+'/latest', {headers:HEADERS_R});
    const d = await res.json();
    const rp = d.record.players || [];
    Object.keys(players).forEach(k => delete players[k]);
    rp.forEach(p => {
      players[p.name] = {coins:p.coins, fish:p.fish||{}, fishLevels:p.fishLevels||{}, messages:p.messages||[], pendingSpawn:p.pendingSpawn||[], pendingGifts:p.pendingGifts||[]};
    });
    renderAdminScreen();
  } catch(e) {}
}

async function pollPlayerData() {
  if (!myName) return;
  try {
    const res = await fetch(GAME_URL+'/latest', {headers:HEADERS_R});
    const d = await res.json();
    const rp = d.record.players || [];
    const me = rp.find(p => p.name === myName);
    if (!me) return;

    // 강제 로그아웃
    if (me.forceLogout) {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      // 서버에서 플레이어 삭제 (이름 재사용 가능하게)
      const newPlayers = rp.filter(p => p.name !== myName);
      await fetch(GAME_URL, {method:'PUT', headers:HEADERS_W, body:JSON.stringify({rooms:d.record.rooms||[], players:newPlayers})});
      const name = myName;
      myName = null; isAdmin = false;
      document.getElementById('logoutBtn').classList.remove('visible');
      showToast(`🚪 강제 로그아웃됐어요!`);
      setTimeout(() => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('startScreen').classList.add('active');
      }, 1500);
      return;
    }

    const msgs   = me.messages     || [];
    const gifts  = me.pendingGifts || [];
    const spawns = me.pendingSpawn  || [];
    if (!msgs.length && !gifts.length && !spawns.length) return;

    // 서버에서 큐 비우기
    const newPlayers = rp.map(p => p.name === myName
      ? {...p, messages:[], pendingGifts:[], pendingSpawn:[]}
      : p
    );
    await fetch(GAME_URL, {method:'PUT', headers:HEADERS_W, body:JSON.stringify({rooms:d.record.rooms||[], players:newPlayers})});

    // 메세지 처리
    msgs.forEach(m => showInboxMsg(m));

    // 선물 처리
    gifts.forEach(g => {
      if (g.type === 'coin') {
        players[myName].coins += g.amount;
        updateCoinDisplay();
        showGiftNotif(`Admin이 💰 ${g.amount} 코인을 선물했어요!`);
      } else if (g.type === 'fish') {
        players[myName].fish[g.grade] = (players[myName].fish[g.grade]||0) + 1;
        spawnTankFish(g.grade); updateTankEmpty();
        showGiftNotif(`Admin이 ${GRADES[g.grade].emoji} ${GRADES[g.grade].name}을(를) 선물했어요!`);

        showGiftNotif(`⬆️ ${GRADES[g.grade].name}이 레벨업됐어요!`);
      }
    });

    // 소환 처리
    spawns.forEach(grade => {
      spawnOceanFish(grade);
      showToast(`🎣 Admin이 ${GRADES[grade].name}을(를) 소환했어요!`);
    });

  } catch(e) {}
}

  spawnOceanFishLoop();
}
function randomGrade() {
  const entries=Object.entries(GRADES).filter(([,g])=>g.spawnWeight>0);
  const total=entries.reduce((s,[,g])=>s+g.spawnWeight,0);
  let r=Math.random()*total;
  for(const [k,g] of entries){ r-=g.spawnWeight; if(r<=0) return k; }
  return 'common';
}
function spawnOceanFishLoop() { spawnOceanFish(); setTimeout(spawnOceanFishLoop, 2500+Math.random()*2500); }
function spawnOceanFish(forcedGrade) {
  const ocean=document.getElementById('oceanView');
  const grade=forcedGrade||randomGrade(); const cfg=GRADES[grade];
  const wrapper=document.createElement('div'); wrapper.className='ocean-fish'; wrapper.style.position='absolute'; wrapper.style.padding='12px'; wrapper.style.cursor='pointer';
  const badge=document.createElement('div'); badge.className=`grade-badge badge-${grade}`; badge.textContent=cfg.label; badge.style.transform='translateX(-50%)'; wrapper.appendChild(badge);
  const inner=document.createElement('div'); inner.innerHTML=fishInnerHTML(grade); wrapper.appendChild(inner);
  const ow=ocean.clientWidth||360; const oh=ocean.clientHeight||340;
  wrapper.style.top=(20+Math.random()*(oh-cfg.h-36))+'px';
  ocean.appendChild(wrapper);
  wrapper.addEventListener('click',()=>openQuiz(grade,wrapper));
  animateOceanFish(wrapper,cfg,ow,oh);
  setTimeout(()=>{ if(wrapper.parentNode) wrapper.remove(); }, 8000+Math.random()*4000);
}
function animateOceanFish(el,cfg,ow,oh) {
  const speed=0.04+Math.random()*0.05; let dir=Math.random()>0.5?1:-1; let pos=dir===1?-cfg.w:ow;
  let vPos=parseFloat(el.style.top); let vDir=Math.random()>0.5?1:-1; const vSpd=0.005+Math.random()*0.008;
  const topMin=20, topMax=oh-cfg.h-36; let last=null;
  el.style.transform=dir===-1?'scaleX(-1)':'scaleX(1)';
  function frame(ts){ if(!el.parentNode) return; if(!last) last=ts; const dt=ts-last; last=ts;
    pos+=dir*speed*dt; if(dir===1&&pos>ow+4){pos=ow;dir=-1;el.style.transform='scaleX(-1)';}
    if(dir===-1&&pos<-cfg.w-4){pos=-cfg.w;dir=1;el.style.transform='scaleX(1)';}
    vPos+=vDir*vSpd*dt; if(vPos<topMin){vPos=topMin;vDir=1;} if(vPos>topMax){vPos=topMax;vDir=-1;}
    el.style.left=pos+'px'; el.style.top=vPos+'px'; requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
}

function startAutoCoins() {
  Object.entries(GRADES).forEach(([grade,g])=>{
    const interval=setInterval(()=>{
      const cnt=players[myName]?.fish?.[grade]||0; if(cnt===0) return;
      const lv=(players[myName]?.fishLevels?.[grade])||0;
      const earned=cnt*(g.autoCoin+(lv*2));
      players[myName].coins+=earned; updateCoinDisplay(); showCoinPop(`+${earned}💰`);
    }, g.autoSec*1000);
    autoTimers.push(interval);
  });
}
function showCoinPop(text) {
  const view=currentView==='ocean'?document.getElementById('oceanView'):document.getElementById('tankView');
  const pop=document.createElement('div'); pop.className='coin-pop'; pop.textContent=text;
  pop.style.left=(20+Math.random()*60)+'%'; pop.style.bottom=(30+Math.random()*40)+'%';
  view.appendChild(pop); setTimeout(()=>pop.remove(),1200);
}

function fishInnerHTML(grade) {
  const g=GRADES[grade].cssClass;
  if(g==='anchovy') return `<div class="fish-anchovy"><div class="body"><div class="tail"></div><div class="eye"></div></div></div>`;
  if(g==='mackerel') return `<div class="fish-mackerel"><div class="body"><div class="stripe"></div><div class="tail"></div><div class="eye"></div></div></div>`;
  return `<div class="fish-${g}"><div class="body"><div class="tail"></div><div class="fin"></div><div class="eye"></div></div></div>`;
}

// ════════════════════════════════
//  문제 생성
// ════════════════════════════════
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
function makeProblem(grade) { if(grade==='common') return makeCommon(); if(grade==='uncommon') return makeUncommon(); if(grade==='rare') return makeRare(); return makeSecret(); }
function makeCommon() { for(let i=0;i<200;i++){ const a=rnd(1,50),b=rnd(1,50),c=rnd(1,30),r=a+b-c; if(r>=1&&r<=100) return {text:`${a} + ${b} - ${c}`,answer:r}; } return {text:'10 + 5 - 3',answer:12}; }
function makeUncommon() { for(let i=0;i<200;i++){ if(rnd(0,1)===0){const a=rnd(2,9),b=rnd(2,9),c=rnd(1,20),r=a*b+c; if(r<=100) return {text:`${a} × ${b} + ${c}`,answer:r};}else{const a=rnd(1,20),b=rnd(2,9),c=rnd(2,9),r=a+b*c; if(r<=100) return {text:`${a} + ${b} × ${c}`,answer:r};} } return {text:'3 × 4 + 2',answer:14}; }
function makeRare() { for(let i=0;i<200;i++){ const a=rnd(1,10),b=rnd(1,10),c=rnd(2,6),d=rnd(1,20),r=(a+b)*c-d; if(r>=1&&r<=100) return {text:`(${a} + ${b}) × ${c} - ${d}`,answer:r}; } return {text:'(5 + 3) × 4 - 6',answer:26}; }
function makeSecret() { for(let i=0;i<400;i++){ const b=rnd(2,6),a=b*rnd(1,8),c=rnd(1,6),e=rnd(2,6),d=rnd(e+1,e+8); const r=(a/b+c)*(d-e); if(Number.isInteger(r)&&r>=1&&r<=100) return {text:`(${a} ÷ ${b} + ${c}) × (${d} - ${e})`,answer:r}; } return {text:'(12 ÷ 4 + 2) × (8 - 3)',answer:25}; }

function showInboxMsg(msg) {
  const inbox=document.getElementById('msgInbox'); const card=document.createElement('div'); card.className='msg-card';
  card.innerHTML=`<div class="msg-from">📨 ${msg.from}에서 온 메세지</div><div class="msg-body">${msg.text}</div><div class="msg-card-btns"><button class="msg-close-btn" onclick="this.closest('.msg-card').remove()">닫기</button><button class="msg-reply-btn" onclick="toggleReply(this)">답장</button></div><div class="msg-reply-area"><textarea class="msg-reply-input" placeholder="답장 내용..."></textarea><button class="msg-reply-send" onclick="sendReply(this,'${msg.from}')">전송</button></div>`;
  inbox.appendChild(card);
}
function toggleReply(btn) { const a=btn.closest('.msg-card').querySelector('.msg-reply-area'); a.style.display=a.style.display==='block'?'none':'block'; }
function sendReply(btn,to) { const text=btn.previousElementSibling.value.trim(); if(!text) return; showToast(`💬 ${to}에게 답장 전송!`); btn.closest('.msg-card').remove(); }
function showGiftNotif(text) {
  const inbox=document.getElementById('msgInbox'); const card=document.createElement('div'); card.className='gift-notif';
  card.innerHTML=`<div class="gift-notif-title">🎁 선물 도착!</div><div class="gift-notif-body">${text}</div><button class="gift-notif-close" onclick="this.closest('.gift-notif').remove()">확인</button>`;
  inbox.appendChild(card);
}

//  댓글
// ════════════════════════════════
window.openCommentModal = async function() {
  await loadComments();
  if(myName||isAdmin){ document.getElementById('commentLoginView').style.display='none'; document.getElementById('commentMainView').style.display='block'; renderComments(); }
  else { document.getElementById('commentLoginView').style.display='block'; document.getElementById('commentMainView').style.display='none'; }
  openModal('commentModal');
}
function commentGoAdmin() { fromComment=true; closeModal('commentModal'); showScreen('loginScreen'); }
function commentGoPlayer() { fromComment=true; closeModal('commentModal'); showScreen('nameScreen'); }
function renderComments() {
  const list=document.getElementById('commentList');
  if(comments.length===0){ list.innerHTML='<div class="comment-no">아직 댓글이 없어요! 첫 댓글을 남겨봐요 😊</div>'; return; }
  list.innerHTML=comments.map((c,i)=>`<div class="comment-item"><div class="comment-author">🎮 ${c.author}</div><div class="comment-text">${c.text}</div><button class="comment-delete ${isAdmin?'visible':''}" onclick="deleteComment(${i})">🗑️</button></div>`).join('');
}
function postComment() {
  const input=document.getElementById('commentInput'); const text=input.value.trim();
  if(!text) return; if(!myName&&!isAdmin){ showToast('로그인 후 댓글을 쓸 수 있어요!'); return; }
  comments.push({author:myName||'Admin',text}); saveComments(); input.value=''; renderComments();
}
function deleteComment(idx) { comments.splice(idx,1); saveComments(); renderComments(); }

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
let _tt=null;
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2000); }
